<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SPPU Question Papers</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c28;
    --border: #2a2a3a;
    --accent: #6c63ff;
    --accent2: #ff6584;
    --accent3: #43e97b;
    --text: #e8e8f0;
    --muted: #7a7a95;
    --card-hover: #1f1f2e;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grain */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  /* Glowing blobs */
  .blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(100px);
    pointer-events: none;
    z-index: 0;
    animation: blobFloat 8s ease-in-out infinite;
  }
  .blob-1 { width: 400px; height: 400px; background: rgba(108,99,255,0.12); top: -100px; right: -100px; animation-delay: 0s; }
  .blob-2 { width: 300px; height: 300px; background: rgba(255,101,132,0.08); bottom: 200px; left: -80px; animation-delay: 3s; }
  .blob-3 { width: 250px; height: 250px; background: rgba(67,233,123,0.06); top: 50%; left: 50%; animation-delay: 5s; }
  @keyframes blobFloat {
    0%, 100% { transform: translateY(0px) scale(1); }
    50% { transform: translateY(-30px) scale(1.05); }
  }

  /* Header */
  header {
    position: relative;
    z-index: 10;
    padding: 0 2rem;
    height: 70px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: rgba(10,10,15,0.8);
    backdrop-filter: blur(20px);
    position: sticky;
    top: 0;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.2rem;
    display: flex;
    align-items: center;
    gap: 0.6rem;
    text-decoration: none;
    color: var(--text);
  }
  .logo-badge {
    background: var(--accent);
    color: white;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.05em;
  }

  nav { display: flex; gap: 1.5rem; align-items: center; }
  nav a {
    color: var(--muted);
    text-decoration: none;
    font-size: 0.9rem;
    transition: color 0.2s;
    cursor: pointer;
  }
  nav a:hover { color: var(--text); }

  /* Hero */
  .hero {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 5rem 2rem 3rem;
  }
  .hero-tag {
    display: inline-block;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 5px 16px;
    border-radius: 999px;
    margin-bottom: 1.5rem;
    background: var(--surface);
  }
  .hero h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2.5rem, 6vw, 4.5rem);
    font-weight: 800;
    line-height: 1.1;
    margin-bottom: 1rem;
  }
  .hero h1 span {
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .hero p {
    color: var(--muted);
    font-size: 1.05rem;
    max-width: 480px;
    margin: 0 auto 2.5rem;
    line-height: 1.7;
  }

  /* Search bar */
  .search-wrap {
    max-width: 480px;
    margin: 0 auto;
    position: relative;
  }
  .search-wrap input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0.85rem 1rem 0.85rem 3rem;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .search-wrap input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(108,99,255,0.15);
  }
  .search-wrap input::placeholder { color: var(--muted); }
  .search-icon {
    position: absolute;
    left: 1rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 1.1rem;
    pointer-events: none;
  }

  /* Main */
  main {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 2rem 1.5rem 5rem;
  }

  /* Branch tabs */
  .branch-tabs {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-bottom: 2.5rem;
  }
  .branch-tab {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    padding: 0.55rem 1.2rem;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
  }
  .branch-tab:hover { border-color: var(--accent); color: var(--text); }
  .branch-tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
    box-shadow: 0 4px 20px rgba(108,99,255,0.3);
  }

  /* Section label */
  .section-header {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1.2rem;
    margin-top: 2rem;
  }
  .section-header h2 {
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .section-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Semester pills */
  .sem-pills {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-bottom: 1.5rem;
  }
  .sem-pill {
    font-size: 0.8rem;
    padding: 0.4rem 1rem;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }
  .sem-pill:hover { color: var(--text); border-color: var(--muted); }
  .sem-pill.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(108,99,255,0.1);
  }

  /* Subject cards grid */
  .subjects-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1rem;
  }

  .subject-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.3rem 1.4rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    cursor: pointer;
    transition: all 0.22s cubic-bezier(0.4,0,0.2,1);
    text-decoration: none;
    color: var(--text);
    position: relative;
    overflow: hidden;
  }
  .subject-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(108,99,255,0.05) 0%, transparent 60%);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .subject-card:hover {
    border-color: rgba(108,99,255,0.5);
    background: var(--card-hover);
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.3);
  }
  .subject-card:hover::before { opacity: 1; }

  .card-left { display: flex; align-items: center; gap: 0.9rem; flex: 1; min-width: 0; }
  .card-icon {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    flex-shrink: 0;
    background: rgba(108,99,255,0.15);
    color: var(--accent);
  }
  .card-title {
    font-size: 0.9rem;
    font-weight: 500;
    line-height: 1.4;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }
  .card-arrow {
    color: var(--muted);
    font-size: 1rem;
    flex-shrink: 0;
    transition: color 0.2s, transform 0.2s;
  }
  .subject-card:hover .card-arrow { color: var(--accent); transform: translateX(3px); }

  /* Modal overlay */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    max-width: 560px;
    width: 100%;
    padding: 2rem;
    position: relative;
    transform: translateY(20px) scale(0.97);
    transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
    max-height: 80vh;
    overflow-y: auto;
  }
  .modal-overlay.open .modal { transform: translateY(0) scale(1); }

  .modal-close {
    position: absolute;
    top: 1rem;
    right: 1rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    width: 32px;
    height: 32px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.2s;
  }
  .modal-close:hover { color: var(--text); }

  .modal-subject {
    font-size: 0.75rem;
    color: var(--accent);
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 0.4rem;
  }
  .modal-title {
    font-family: 'Syne', sans-serif;
    font-size: 1.5rem;
    font-weight: 700;
    margin-bottom: 1.5rem;
    padding-right: 2rem;
  }

  .paper-list { display: flex; flex-direction: column; gap: 0.7rem; }
  .paper-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.9rem 1.1rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    transition: border-color 0.2s;
  }
  .paper-item:hover { border-color: var(--accent); }
  .paper-info { display: flex; align-items: center; gap: 0.7rem; }
  .paper-icon { font-size: 1.2rem; color: var(--accent2); }
  .paper-year { font-weight: 500; font-size: 0.9rem; }
  .paper-exam { font-size: 0.75rem; color: var(--muted); }
  .paper-btn {
    background: var(--accent);
    color: white;
    border: none;
    padding: 0.45rem 1rem;
    border-radius: 7px;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    transition: opacity 0.2s;
    font-family: 'DM Sans', sans-serif;
  }
  .paper-btn:hover { opacity: 0.85; }

  .add-paper-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    width: 100%;
    padding: 0.8rem;
    margin-top: 1rem;
    border: 1px dashed var(--border);
    border-radius: 10px;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-size: 0.85rem;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
  }
  .add-paper-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--muted);
  }
  .empty-state .emoji { font-size: 3rem; margin-bottom: 1rem; }
  .empty-state p { font-size: 0.95rem; }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 2rem;
    flex-wrap: wrap;
    margin-bottom: 2rem;
    padding: 1rem 1.5rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
  }
  .stat { display: flex; flex-direction: column; gap: 2px; }
  .stat-num {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1.3rem;
    color: var(--text);
  }
  .stat-label { font-size: 0.78rem; color: var(--muted); }

  /* No results */
  .no-results {
    text-align: center;
    padding: 3rem;
    color: var(--muted);
    font-size: 0.95rem;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media (max-width: 600px) {
    .hero { padding: 3rem 1.2rem 2rem; }
    .subjects-grid { grid-template-columns: 1fr; }
    .stats-bar { gap: 1rem; }
  }

  /* Animate in */
  .subjects-grid { animation: fadeUp 0.4s ease both; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<header>
  <a class="logo" href="#">
    <span class="logo-badge">SPPU</span>
    Question Papers
  </a>
  <nav>
    <a onclick="scrollTo(0,0)">Home</a>
    <a href="https://github.com" target="_blank">GitHub</a>
  </nav>
</header>

<div class="hero">
  <div class="hero-tag">Savitribai Phule Pune University</div>
  <h1>Previous Year<br/><span>Question Papers</span></h1>
  <p>Access SPPU engineering question papers by branch, semester and subject — all in one place.</p>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Search subject, e.g. Data Structures..." oninput="handleSearch(this.value)" />
  </div>
</div>

<main>
  <div class="stats-bar">
    <div class="stat"><span class="stat-num">4</span><span class="stat-label">Branches</span></div>
    <div class="stat"><span class="stat-num" id="totalSubjects">0</span><span class="stat-label">Subjects</span></div>
    <div class="stat"><span class="stat-num">FY – S6</span><span class="stat-label">Semesters</span></div>
    <div class="stat"><span class="stat-num">Free</span><span class="stat-label">Access</span></div>
  </div>

  <div class="branch-tabs" id="branchTabs"></div>
  <div id="semPills" class="sem-pills"></div>
  <div id="sectionHeader" class="section-header" style="display:none">
    <h2 id="sectionTitle">Subjects</h2>
    <div class="section-line"></div>
  </div>
  <div id="subjectsGrid" class="subjects-grid"></div>
  <div id="noResults" class="no-results" style="display:none">No subjects found for "<span id="searchTerm"></span>"</div>
</main>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-subject" id="modalBranch"></div>
    <div class="modal-title" id="modalTitle"></div>
    <div class="paper-list" id="paperList"></div>
    <button class="add-paper-btn" onclick="addPaperPrompt()">＋ Add Question Paper Link</button>
  </div>
</div>

<script>
const data = {
  "First Year Engineering": {
    color: "#43e97b",
    icon: "🎓",
    semesters: {
      "Semester 1": [
        { name: "Engineering Mathematics I", papers: [] },
        { name: "Engineering Physics", papers: [] },
        { name: "Engineering Mechanics", papers: [] },
        { name: "Basic Electrical Engineering", papers: [] },
        { name: "Programming and Problem Solving", papers: [] },
      ],
      "Semester 2": [

        { name: "Engineering Chemistry", papers: [] },

        { name: "Engineering Graphics", papers: [] },
        { name: "Systems in Mechanical Engineering", papers: [] },
      ]
    }
  },
  "AI & Data Science": {

    semesters: {

        { name: "Fundamentals of Data Structures", papers: [] },
        { name: "Object Oriented Programming", papers: [] },

      ],

        { name: "Pattern Recognition (Elective I)", papers: [] },
        { name: "Human Computer Interface (Elective I)", papers: [] },
      ],
      "Semester 6": [
        { name: "Artificial Neural Network", papers: [] },
        { name: "Data Science", papers: [] },
        { name: "Cyber Security", papers: [] },
        { name: "Natural Language Processing (Elective II)", papers: [] },
        { name: "Cloud Computing (Elective II)", papers: [] },
        { name: "Software Modeling and Architecture (Elective II)", papers: [] },
      ]
    }
  },
  "Information Technology": {
    color: "#ff9f43",
    icon: "💻",
    semesters: {
      "Semester 3": [
        { name: "Data Structures and Algorithms", papers: [] },
        { name: "Discrete Mathematics", papers: [] },
        { name: "Basics of Computer Network", papers: [] },
        { name: "Object Oriented Programming", papers: [] },
        { name: "Logic Design and Computer Organization", papers: [] },
      ],
      "Semester 4": [
        { name: "Computer Graphics", papers: [] },
        { name: "Database Management System", papers: [] },
        { name: "Engineering Mathematics III", papers: [] },
        { name: "Processor Architecture", papers: [] },
        { name: "Software Engineering", papers: [] },
      ],
      "Semester 5": [
        { name: "Machine Learning", papers: [] },
        { name: "Operating Systems", papers: [] },
        { name: "Theory of Computation", papers: [] },
        { name: "Human Computer Interaction", papers: [] },
        { name: "Internet of Things (Elective I)", papers: [] },
        { name: "Advanced DBMS (Elective I)", papers: [] },
        { name: "Design and Analysis of Algorithms (Elective I)", papers: [] },
      ],
      "Semester 6": [
        { name: "Computer Network and Security", papers: [] },
        { name: "Data Science and Big Data Analytics", papers: [] },
        { name: "Web Application Development", papers: [] },
        { name: "Cloud Computing (Elective II)", papers: [] },
        { name: "Cyber Security (Elective II)", papers: [] },
      ]
    }
  },
  "Computer Science": {
    color: "#ff6584",
    icon: "🖥️",
    semesters: {
      "Semester 4": [
        { name: "Microprocessor", papers: [] },
        { name: "Principles of Programming Languages", papers: [] },
      ],
      "Semester 5": [
        { name: "Computer Network and Security", papers: [] },
        { name: "Database Management Systems", papers: [] },
        { name: "Systems Programming and Operating System", papers: [] },
        { name: "Theory of Computation", papers: [] },
        { name: "Human Computer Interface (Elective I)", papers: [] },
        { name: "Internet of Things and Embedded Systems (Elective I)", papers: [] },
        { name: "Software Project Management (Elective I)", papers: [] },
      ],
      "Semester 6": [

        { name: "Data Science and Big Data Analytics", papers: [] },
        { name: "Web Technology", papers: [] },
        { name: "Information Security (Elective II)", papers: [] },
        { name: "Augmented and Virtual Reality (Elective II)", papers: [] },
        { name: "Software Modeling and Architectures (Elective II)", papers: [] },
      ]
    }
  }
};

// Load from localStorage
function loadPapers() {
  const saved = localStorage.getItem('sppu_papers');
  if (!saved) return;
  const savedData = JSON.parse(saved);
  for (const branch in savedData) {
    if (!data[branch]) continue;
    for (const sem in savedData[branch]) {
      if (!data[branch].semesters[sem]) continue;
      savedData[branch][sem].forEach(savedSubj => {
        const subj = data[branch].semesters[sem].find(s => s.name === savedSubj.name);
        if (subj) subj.papers = savedSubj.papers;
      });
    }
  }
}

function savePapers() {
  const toSave = {};
  for (const branch in data) {
    toSave[branch] = {};
    for (const sem in data[branch].semesters) {
      toSave[branch][sem] = data[branch].semesters[sem].map(s => ({ name: s.name, papers: s.papers }));
    }
  }
  localStorage.setItem('sppu_papers', JSON.stringify(toSave));
}

loadPapers();

const branches = Object.keys(data);
let activeBranch = branches[0];
let activeSem = null;
let currentSubject = null;
let searchQuery = '';

// Count total subjects
let total = 0;
branches.forEach(b => Object.values(data[b].semesters).forEach(subs => total += subs.length));
document.getElementById('totalSubjects').textContent = total;

function renderBranchTabs() {
  const container = document.getElementById('branchTabs');
  container.innerHTML = branches.map(b => `
    <button class="branch-tab ${b === activeBranch ? 'active' : ''}" onclick="selectBranch('${b}')">${data[b].icon} ${b}</button>
  `).join('');
}

function selectBranch(b) {
  activeBranch = b;
  const sems = Object.keys(data[b].semesters);
  activeSem = sems[0];
  searchQuery = '';
  document.getElementById('searchInput').value = '';
  renderBranchTabs();
  renderSemPills();
  renderSubjects();
}

function renderSemPills() {
  const sems = Object.keys(data[activeBranch].semesters);
  const container = document.getElementById('semPills');
  container.innerHTML = sems.map(s => `
    <button class="sem-pill ${s === activeSem ? 'active' : ''}" onclick="selectSem('${s}')">${s}</button>
  `).join('');
}

function selectSem(s) {
  activeSem = s;
  renderSemPills();
  renderSubjects();
}

function renderSubjects(subjects) {
  const grid = document.getElementById('subjectsGrid');
  const header = document.getElementById('sectionHeader');
  const noResults = document.getElementById('noResults');
  noResults.style.display = 'none';

  const subjectList = subjects || (activeSem ? data[activeBranch].semesters[activeSem] : []);

  if (!subjectList || subjectList.length === 0) {
    grid.innerHTML = '';
    header.style.display = 'none';
    noResults.style.display = 'block';
    document.getElementById('searchTerm').textContent = searchQuery;
    return;
  }

  header.style.display = 'flex';
  document.getElementById('sectionTitle').textContent =
    searchQuery ? `Results for "${searchQuery}"` : `${activeBranch} — ${activeSem}`;

  grid.style.animation = 'none';
  grid.offsetHeight;
  grid.style.animation = '';

  grid.innerHTML = subjectList.map((subj, i) => {
    const branch = subj._branch || activeBranch;
    const paperCount = subj.papers.length;
    return `
    <div class="subject-card" onclick="openModal('${branch}', '${activeSem || subj._sem}', ${i}, '${subj._branch || ''}', '${subj._sem || ''}')">
      <div class="card-left">
        <div class="card-icon" style="background:${data[branch].color}22;color:${data[branch].color}">📄</div>
        <div>
          <div class="card-title">${subj.name}</div>
          <div style="font-size:0.73rem;color:var(--muted);margin-top:2px">${paperCount > 0 ? paperCount + ' paper' + (paperCount > 1 ? 's' : '') : 'No papers yet'}</div>
        </div>
      </div>
      <span class="card-arrow">→</span>
    </div>`;
  }).join('');
}

function handleSearch(val) {
  searchQuery = val.trim().toLowerCase();
  document.getElementById('semPills').style.display = searchQuery ? 'none' : 'flex';

  if (!searchQuery) {
    renderSemPills();
    renderSubjects();
    return;
  }

  const results = [];
  branches.forEach(branch => {
    Object.entries(data[branch].semesters).forEach(([sem, subjects]) => {
      subjects.forEach(subj => {
        if (subj.name.toLowerCase().includes(searchQuery)) {
          results.push({ ...subj, _branch: branch, _sem: sem });
        }
      });
    });
  });

  document.getElementById('sectionHeader').style.display = 'flex';
  document.getElementById('sectionTitle').textContent = `Results for "${val}"`;
  renderSubjects(results);
}

function openModal(branch, sem, index, overrideBranch, overrideSem) {
  const b = overrideBranch || branch;
  const s = overrideSem || sem;
  const subj = data[b].semesters[s][index];
  currentSubject = { branch: b, sem: s, index };

  document.getElementById('modalBranch').textContent = `${b} — ${s}`;
  document.getElementById('modalTitle').textContent = subj.name;

  renderPaperList(subj.papers);
  document.getElementById('modalOverlay').classList.add('open');
}

function renderPaperList(papers) {
  const list = document.getElementById('paperList');
  if (papers.length === 0) {
    list.innerHTML = `<div style="text-align:center;padding:2rem;color:var(--muted);font-size:0.9rem">No papers added yet.<br/>Click below to add a Google Drive link.</div>`;
    return;
  }
  list.innerHTML = papers.map((p, i) => `
    <div class="paper-item">
      <div class="paper-info">
        <span class="paper-icon">📋</span>
        <div>
          <div class="paper-year">${p.year} — ${p.exam}</div>
          <div class="paper-exam">Question Paper</div>
        </div>
      </div>
      <div style="display:flex;gap:0.5rem;align-items:center">
        <a class="paper-btn" href="${p.url}" target="_blank">View PDF</a>
        <button onclick="removePaper(${i})" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:1rem;padding:4px" title="Remove">✕</button>
      </div>
    </div>
  `).join('');
}

function removePaper(i) {
  const { branch, sem, index } = currentSubject;
  data[branch].semesters[sem][index].papers.splice(i, 1);
  savePapers();
  renderPaperList(data[branch].semesters[sem][index].papers);
  renderSubjects();
}

function addPaperPrompt() {
  const year = prompt('Enter exam year (e.g. 2023):');
  if (!year) return;
  const exam = prompt('Enter exam type (e.g. End Sem / Mid Sem):');
  if (!exam) return;
  const url = prompt('Paste your Google Drive link:');
  if (!url) return;

  const { branch, sem, index } = currentSubject;
  data[branch].semesters[sem][index].papers.push({ year, exam, url });
  savePapers();
  renderPaperList(data[branch].semesters[sem][index].papers);
  renderSubjects();
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modalOverlay') && !e.target.classList.contains('modal-close')) return;
  document.getElementById('modalOverlay').classList.remove('open');
}

// Init
selectBranch(activeBranch);
</script>
</body>
</html>
